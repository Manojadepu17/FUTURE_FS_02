services:
  # Backend + Frontend Web Service
  - type: web
    name: mini-crm
    env: node
    region: oregon
    buildCommand: cd server && npm install && cd ../client && npm install && npm run build && cd ..
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://mini-crm.onrender.com
